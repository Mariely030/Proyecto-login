<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
        }

        button {
            padding: 5px 10px;
            margin: 2px;
            cursor: pointer;
        }

        .container {
            margin-top: 50px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Usuarios registrados</h2>

    <table id="tablaUsuarios">
        <thead>
            <tr>
                <th>Usuario</th>
                <th>Contraseña</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

   <table id="tablaUsuarios">
    <!-- tu tabla -->
</table>

<div style="margin-top: 20px;">
    <button onclick="window.location.href='index.html'">
        Volver al Login
    </button>
</div>

<script>
    function cargarUsuarios() {
        let users = JSON.parse(localStorage.getItem("users")) || [];
        let tabla = document.querySelector("#tablaUsuarios tbody");
        tabla.innerHTML = "";

        users.forEach((u, index) => {
            let fila = `
                <tr>
                    <td><input value="${u.user}" id="user-${index}" disabled></td>
                    <td><input value="${u.pass}" id="pass-${index}" disabled></td>
                    <td>
    <button onclick="activarEdicion(${index})">Editar</button>
    <button onclick="actualizarUsuario(${index})">Guardar</button>
    <button onclick="eliminarUsuario(${index})">Eliminar</button>
</td>
                </tr>
            `;
            tabla.innerHTML += fila;
        });
    }

    function activarEdicion(index) {
    document.getElementById(`user-${index}`).disabled = false;
    document.getElementById(`pass-${index}`).disabled = false;
}

function actualizarUsuario(index) {
    let users = JSON.parse(localStorage.getItem("users")) || [];

    let nuevoUser = document.getElementById(`user-${index}`).value;
    let nuevaPass = document.getElementById(`pass-${index}`).value;

    users[index].user = nuevoUser;
    users[index].pass = nuevaPass;

    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById(`user-${index}`).disabled = true;
    document.getElementById(`pass-${index}`).disabled = true;

    alert("Usuario actualizado");
}

    function eliminarUsuario(index) {
    let users = JSON.parse(localStorage.getItem("users")) || [];

    let confirmar = confirm("¿Seguro que deseas eliminar este usuario?");

    if (!confirmar) {
        return; // cancela eliminación
    }

    users.splice(index, 1);
    localStorage.setItem("users", JSON.stringify(users));

    alert("Usuario eliminado");
    cargarUsuarios();
}

    window.onload = cargarUsuarios;
</script>

</body>
</html>
